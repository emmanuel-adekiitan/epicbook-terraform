---
- name: Install Nginx
  apt:
    name: nginx
    state: present

- name: Setup EpicBook Config from Template
  template:
    src: epicbook.conf.j2
    dest: /etc/nginx/sites-available/epicbook
  notify: Restart Nginx

- name: Enable site and remove default
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Activate EpicBook site
  file:
    src: /etc/nginx/sites-available/epicbook
    dest: /etc/nginx/sites-enabled/epicbook
    state: link

   